<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maten Soundboard</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#121212;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

#search{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:20px;
    font-size:16px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
}

button{
    background:#1f1f1f;
    color:white;
    border:none;
    border-radius:12px;
    padding:20px;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
    background:#333;
}
</style>
</head>

<body>

<h1>Geluiden uit de doos</h1>

<input
id="search"
type="text"
placeholder="Zoek een sound..."
onkeyup="filterSounds()"
/>

<div class="grid" id="soundGrid">

<button data-name="eigenlulopdebbq" onclick="playSound('sounds/eigenlulopdebbq.mp3')">
🍆 BBQ
</button>

<button data-name="vos" onclick="playSound('sounds/vos.mp3')">
Vos
</button>

<button data-name="courgette" onclick="playSound('sounds/courgette.mp3')">
Courgette
</button>

<button data-name="bingbong" onclick="playSound('sounds/bingbong.mp3')">
Bingbong
</button>

<button data-name="gieter" onclick="playSound('sounds/gieter.mp3')">
Gieter
</button>
    
<button data-name="metro" onclick="playSound('sounds/metro.mp3')">
Metro
</button>
    
<button data-name="rammen" onclick="playSound('sounds/rammen.mp3')">
Rammen
</button>

<button data-name="rose" onclick="playSound('sounds/rose.mp3')">
Rosé
</button>

<button data-name="sodeklappers" onclick="playSound('sounds/sodeklappers.mp3')">
Sodeklappers
</button>

<button data-name="jef" onclick="playSound('sounds/jef.mp3')">
Jeffrey
</button>

<button data-name="liter" onclick="playSound('sounds/liter.mp3')">
Liter
</button>

</div>

<script>
function playSound(file){
    const audio = new Audio(file);
    audio.play();
}

function filterSounds(){
    const search =
      document.getElementById("search")
      .value.toLowerCase();

    const buttons =
      document.querySelectorAll("#soundGrid button");

    buttons.forEach(btn => {
        const name =
          btn.dataset.name.toLowerCase();

        btn.style.display =
          name.includes(search)
          ? "block"
          : "none";
    });
}
</script>

</body>
</html>
